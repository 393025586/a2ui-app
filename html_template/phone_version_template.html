<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        /* === 基础环境 === */
        html { font-size: 100px !important; box-sizing: border-box; }
        *, ::after, ::before { box-sizing: inherit; }

        body {
            margin: 0; padding: 0;
            background-color: transparent; /* Streamlit 背景透明 */
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; /* 禁止外部滚动 */
        }

        /* === 手机外框容器 === */
        .preview-wrapper {
            width: 375px;
            height: 812px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border-radius: 40px;
            background: #fff;
            overflow: hidden;
            margin: 0 auto; /* 居中 */
        }

        /* === 内部仿真器 === */
        .phone-simulator {
            width: 750px;
            height: 1624px;
            background-color: #F5F7FA;
            position: absolute;
            top: 0; left: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: scale(0.5);
            transform-origin: 0 0;
        }

        .status-bar {
            height: 88px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; background: rgba(255,255,255,0.95);
            z-index: 10; flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 32px; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* === 聊天气泡 === */
        .chat-row { display: flex; margin-bottom: 40px; align-items: flex-start; }
        .chat-row.right { justify-content: flex-end; }
        .chat-row.left { justify-content: flex-start; }

        .chat-bubble {
            max-width: 70%; padding: 24px 32px; border-radius: 32px;
            font-size: 30px; line-height: 1.5; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .chat-row.right .chat-bubble { background: #1677ff; color: #fff; margin-right: 20px; border-top-right-radius: 8px; }
        .chat-row.left .chat-bubble { background: #fff; color: #333; margin-left: 20px; border-top-left-radius: 8px; }

        .avatar {
            width: 80px; height: 80px; border-radius: 50%; background: #ddd;
            flex-shrink: 0; border: 2px solid #fff; overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* === 核心内容卡片样式 === */
        .response-container {
            width: 100%; background: #fff; border-radius: 36px; padding: 40px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04); box-sizing: border-box;
            font-size: 28px; color: #333; margin-bottom: 40px;
        }

        .response-container h1 { font-family: 'Noto Serif SC', serif; font-size: 48px; line-height: 1.4; margin: 0 0 32px 0; color: #333; font-weight: normal; }
        .response-container h2 { display: flex; align-items: center; font-size: 32px; font-weight: 700; margin: 40px 0 24px 0; }
        .response-container h2 .label { display: inline-block; margin-right: 16px; width: 40px; height: 40px; color: #1677ff; border-radius: 10px; font-size: 24px; text-align: center; line-height: 40px; background: rgba(22, 119, 255, 0.1); flex-shrink: 0; }

        .response-container p { font-size: 30px; line-height: 1.6; margin: 0 0 24px 0; text-align: justify; color: #333; }

        .response-container .inline-link { color: #1677ff; font-weight: 500; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; margin: 0 4px; vertical-align: baseline; }
        .response-container .inline-link::after { content: ""; display: inline-block; width: 24px; height: 24px; margin-left: 4px; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71' stroke='%231677ff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71' stroke='%231677ff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-size: contain; background-repeat: no-repeat; background-position: center; }

        .response-container blockquote { margin: 32px 0; padding-left: 24px; border-left: 6px solid #E5E5E5; color: #666; font-size: 30px; line-height: 1.6; }

        /* --- 横向滑动表格样式 (New) --- */

        /* 1. 滚动容器 (由 Python 自动包裹) */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 24px 0 48px 0;
            padding-bottom: 10px;
        }

        /* 2. 表格本体 */
        .response-container table {
            width: auto;
            min-width: 100%;
            border-collapse: collapse;
            border: none;
            margin: 0;
        }

        /* 3. 表头与单元格 (不换行) */
        .response-container th,
        .response-container td {
            white-space: nowrap;
            padding: 32px 24px;
            font-size: 30px;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: middle;
        }

        .response-container th {
            text-align: left;
            font-size: 26px;
            color: #999;
            font-weight: normal;
            border-bottom: 1px solid #f0f0f0;
        }

        .response-container td { color: #333; }

        /* 4. 最后一列 (右对齐，无强制颜色) */
        .response-container th:last-child,
        .response-container td:last-child {
            text-align: right;
            padding-right: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .response-container th:first-child,
        .response-container td:first-child { padding-left: 0; }

        /* 5. 高亮样式工具类 */
        .response-container .highlight {
            color: #1677ff;
            font-weight: bold;
        }

        /* 列表 */
        .response-container ul { margin: 24px 0 48px 0; padding-left: 40px; list-style-type: disc; }
        .response-container li { margin-bottom: 24px; font-size: 30px; line-height: 1.6; color: #333; text-align: justify; }

        /* 服务卡片 */
        .response-container .service-card { width: 100%; height: 144px; background: #FFFCF2; border-radius: 24px; display: flex; align-items: center; padding: 0 24px; margin-bottom: 32px; box-sizing: border-box; text-decoration: none; cursor: pointer; }
        .response-container .service-card .icon-box { width: 96px; height: 96px; border-radius: 20px; overflow: hidden; flex-shrink: 0; margin-right: 24px; background: #fff; }
        .response-container .service-card .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .response-container .service-card .content { flex: 1; overflow: hidden; margin-right: 16px; }
        .response-container .service-card .title { font-size: 32px; font-weight: bold; color: #333; margin-bottom: 8px; line-height: 1.2; }
        .response-container .service-card .desc { font-size: 24px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .response-container .service-card .arrow { width: 16px; height: 16px; border-top: 3px solid #ccc; border-right: 3px solid #ccc; transform: rotate(45deg); margin-left: 8px; }

        /* 图表卡片 */
        .chart-card { border: 1px solid #F0F0F0; border-radius: 24px; padding: 32px; margin-top: 32px; background: #fff; }
        .chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
        .chart-title { font-size: 32px; font-weight: bold; color: #333; }
        .chart-subtitle { font-size: 24px; color: #999; }
        .chart-canvas-wrapper { position: relative; height: 320px; width: 100%; }
        .chart-footer { margin-top: 24px; font-size: 22px; color: #ccc; text-align: right; }

    </style>
</head>
<body>

    <div class="preview-wrapper">
        <div class="phone-simulator">
            <div class="status-bar">9:41</div>

            <div class="scroll-area">

                __USER_BUBBLE__

                __INTRO_BUBBLE__

                <div class="response-container">
                    __MAIN_CONTENT__
                </div>

                __ENDING_BUBBLE__

                <div style="height: 60px;"></div>
            </div>
        </div>
    </div>

</body>
</html>
